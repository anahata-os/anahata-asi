        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[12] Command Center: Granular Security Permissions</h4>\
        <p style="font-size: 16px; color: #4a5568; margin: 0 0 15px 0;">\
            Assign Prompt, Always, or Never execution permissions across 148+ stateful JVM tools. Enjoy completely secure, sandboxable coding without blind writes.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/tool-permissions-preferences.png" target="_blank">\
