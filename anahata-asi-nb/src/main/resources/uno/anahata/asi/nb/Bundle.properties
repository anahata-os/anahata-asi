    <h2 style="font-size: 26px;">Compiled Platform Toolkits (140+ Native JVM Tools)</h2>\
    <p style="color: #4a5568; margin-bottom: 25px; font-size: 16px;">\
        Anahata hosts a robust, stateful registry of compiled tools running directly in-process. Below is the simplified catalog of active capability suites:\
    </p>\
\
    <div style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 40px;">\
        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 15px;">\
            <thead>\
                <tr style="background: #edf2f7; border-bottom: 2px solid #e2e8f0;">\
                    <th style="padding: 12px 15px; font-weight: bold; color: #2d3748; width: 25%;">Toolkit Name</th>\
                    <th style="padding: 12px 15px; color: #2d3748; width: 60%;">Capability Scope & System Access</th>\
