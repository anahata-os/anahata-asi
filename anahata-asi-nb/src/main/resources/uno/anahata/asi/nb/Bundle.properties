    <h2 style="font-size: 18px;">Live Interactive Capabilities Showcase</h2>\
    <p style="color: #4a5568; margin-bottom: 20px; font-size: 13px;">Explore the active, high-fidelity visual representations of V2 operating directly inside the Apache NetBeans IDE (Click any image to view in full resolution):</p>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[1] Singularity Engine: Dynamic JIT Java Compiler</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            The model compiles and executes raw Java code directly inside your running NetBeans JVM utilizing our custom child-first ClassLoader. Build, test, and hot-load live tools, Java swing panels, or complex dependency algorithms on-the-fly.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/NbJava.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/NbJava.png" alt="Anahata JIT Compiler" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[2] Multimodal Vision: Real-Time Screen & Region Sharing</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Share physical screens, specific monitors, or custom rectangular regions with the ASI. Perfect for providing real-time visual feedback on Swing UI renders, layouts, or compiler states.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/NetBeansLiveScreenSharingAdrianaLima.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/NetBeansLiveScreenSharingAdrianaLima.png" alt="Live Screen Sharing" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[3] Atomic Context: Visual Resource Highlighting</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Complete visual context awareness. Files loaded into the active AI context automatically light up with a vibrant indicator directly inside the NetBeans Projects, Files, and Favorites views.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/InContextResourcesVisualization.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/InContextResourcesVisualization.png" alt="Resource Visualization" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[4] Real-Time 3D & Hardware Prototyping (LWJGL)</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            With built-in LWJGL, GLFW, and OpenGL dependencies, the agent can write, compile, and run raw, real-time 3D rendering windows and game prototypes directly on the host JVM.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/NetBeansBundledLWJGL.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/NetBeansBundledLWJGL.png" alt="Bundled LWJGL support" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[5] Agentic Feedback: Inline AI Code Annotations</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Model suggestions, code explanations, and diagnostics are painted dynamically directly onto your source code lines within the NetBeans editor, acting as non-intrusive guide markers.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/InlineAIAnnotations.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/InlineAIAnnotations.png" alt="Inline AI Annotations" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[6] Self-Healing Filesystem tracking (NbHandle)</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Every resource handle in context is bound to a native NetBeans <code>FileObject</code>. If you drag-and-drop, rename, cut, or paste a file across projects, the handle auto-heals and preserves context.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/NbHandleForFileObjectIntegration.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/NbHandleForFileObjectIntegration.png" alt="NbHandle Integration" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[7] Project Structure & Class Hierarchy Mapping</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            The model receives structured directory trees of all open source packages, mapping classes, interfaces, records, field modifiers, and precise sizes without expensive directory walking.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/ProjectStructureContextProvider.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/ProjectStructureContextProvider.png" alt="Project Structure mapping" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[8] Instant Diagnostics & Javac Errors Cache</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Continuous, turn-by-turn tracking of workspace health. If a code patch triggers a compilation error, the agent instantly receives the full compiler error stack trace during reloop.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/ProjectAlertsContextProvider.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/ProjectAlertsContextProvider.png" alt="Project Alerts diagnostics" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[9] Deep Work Zone: Curated Radio & MIDI Synthesizer</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Maintain complete creative focus. Stream high-fidelity internet radio (such as SomaFM, NTS, or KEXP Seattle) directly from NetBeans.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/RadioTool.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/RadioTool.png" alt="Radio tool dashboard" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 10px; font-size: 15px;">[10] Context Window Garbage Collector (CwGC) Logs</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            A revolutionary, depth-based context window metabolism. Messages fade gradually depending on their type, and both model and developer can pin or prune parts to support infinitely long sessions.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/ContextWindowGarbageCollector.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/ContextWindowGarbageCollector.png" alt="CwGC Metabolism Dashboard" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
        </a>\
    </div>\
\
    <div style="margin-bottom: 30px; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">\
        <h4 style="color: #004d98; margin-top: 0; margin-bottom: 8px; font-size: 15px;">[11] Human-in-the-Loop Parameter Modification</h4>\
        <p style="font-size: 13px; color: #4a5568; margin: 0 0 12px 0;">\
            Complete control over tool execution. View, review, edit, or clear parameters and Java payloads with full syntax highlighting before letting the agent execute them.\
        </p>\
        <a href="https://asi.anahata.uno/screenshots/netbeans/editable-java-tool-calls-shl.png" target="_blank">\
            <img src="https://asi.anahata.uno/screenshots/netbeans/editable-java-tool-calls-shl.png" alt="Editable parameters" width="1400" style="border: 1px solid #ddd; border-radius: 4px; margin: 0; display: block;"/>\
