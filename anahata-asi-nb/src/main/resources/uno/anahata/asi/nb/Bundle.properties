OpenIDE-Module-Long-Description=<html><div style="font-family: sans-serif; text-align: left;">\
<h2>Anahata ASI Studio: The Best Java / Maven AI Assistant on Earth</h2>\
<ul>\
    <li><strong>Enterprise Architecture & Review:</strong> High-fidelity awareness of all types, hierarchies and members across all open projects leveraging NetBeans syntax trees, code analysis, diagnostics, editor hints, refactoring and versioning APIs. Mermaid UML support.</li>\
    <li><strong>Surgical Code Editing:</strong> Fully reviewable, editable changes to multiple source code files with cherry-picking and overlaid comic-style bubbles for AI comments directly in the NetBeans-native Diff Viewer (Graphical side-by-side or textual). One-Shot fetching of any project, dependency or JDK sources.</li>\
    <li><strong>Self-Correcting Agentic Workflow:</strong> True self-correcting reloop. When the model modifies a source file, Anahata holds the reloop until the NetBeans source code scanner finishes and reports any compiler errors or project problems. If you see an error badge, so will the model.</li>\
    <li><strong>Visual Context Awareness:</strong> Real-time visual context awareness \u2014 files light up in the Projects, Files or Favourites view the moment the agent or you loads them onto context. See which files are in context like you see which files have git changes.</li>\
    <li><strong>JIT Java Execution:</strong> JIT compilation and execution of LLM generated java code against project sources, dependencies, netbeans apis or any Java library on the internet directly on the NetBeans JVM with Anahata's custom Child-First Classloader.</li>\
</ul>\
\
<h3>Visual Intelligence & Integration:</h3>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Visual Context Awareness</h3>\
<p style="font-size: 1.1rem;">See what projects, packages or files are in context directly on the Projects, Files or Favourites tabs.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/InContextResourcesVisualization.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Singularity Engine</h3>\
<p style="font-size: 1.1rem;">Run, Edit, Re-Run LLM generated Java code against your project sources with Anahata\'s JIT Compiler.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/NbJava.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Agentic Feedback</h3>\
<p style="font-size: 1.1rem;">AI explanations and overlayed on the NetBeans-native diff viewer.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/InlineAIAnnotations.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Native Sync</h3>\
<p style="font-size: 1.1rem;">FileObject Resource adapter for tracking changes to resources in context. Drag and Drop files from NetBeans or your desktop.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/NbHandleForFileObjectIntegration.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Instant Project Awareness</h3>\
<p style="font-size: 1.1rem;">Directory tree of all project Source Groups with element kinds, inner types, versioning info and file sizes.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/ProjectStructureContextProvider.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Real-time javac alerts</h3>\
<p style="font-size: 1.1rem;">If you can see an error badge, so can the model. Compiler alerts integrated directly into the agentic reloop.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/ProjectAlertsContextProvider.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Focused Development</h3>\
<p style="font-size: 1.1rem;">The integrated Radio toolkit providing the soundtrack for Tiki-Taka coding sessions.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/RadioTool.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 30px;">\
<h3 style="color: #004d98;">Metabolic Intelligence</h3>\
<p style="font-size: 1.1rem;">Real-time tracking of the context window garbage collector (CwGC) and prompt metabolism.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/ContextWindowGarbageCollector.png">\
</div>\
\
<hr>\
<p><em>Built with passion for the NetBeans community. Visca el Bar\u00e7a! </em></p>\
</div> (c) Anahata</html>
